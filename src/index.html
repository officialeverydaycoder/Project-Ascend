<!-- Toast Container -->

<!-- Modal Root -->
<div id="modal-root"></div>

<!-- ── Animated Background ── -->
<script>
(function() {
  const canvas = document.getElementById('bg-canvas');
  const ctx    = canvas.getContext('2d');
  let W, H, orbs = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function makeOrb() {
    return {
      x:  Math.random() * W,
      y:  Math.random() * H,
      r:  180 + Math.random() * 300,
      vx: (Math.random() - 0.5) * 0.15,
      vy: (Math.random() - 0.5) * 0.15,
      hue: Math.random() > 0.5 ? 258 : 290,   /* indigo / violet */
      alpha: 0.03 + Math.random() * 0.05,
    };
  }

  function init() {
    resize();
    orbs = Array.from({ length: 5 }, makeOrb);
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    orbs.forEach(o => {
      o.x += o.vx; o.y += o.vy;
      if (o.x < -o.r) o.x = W + o.r;
      if (o.x > W + o.r) o.x = -o.r;
      if (o.y < -o.r) o.y = H + o.r;
      if (o.y > H + o.r) o.y = -o.r;

      const g = ctx.createRadialGradient(o.x, o.y, 0, o.x, o.y, o.r);
      g.addColorStop(0, `hsla(${o.hue}, 80%, 65%, ${o.alpha})`);
      g.addColorStop(1, `hsla(${o.hue}, 80%, 65%, 0)`);
      ctx.beginPath();
      ctx.arc(o.x, o.y, o.r, 0, Math.PI * 2);
      ctx.fillStyle = g;
      ctx.fill();
    });

    /* subtle grid */
    ctx.strokeStyle = 'rgba(108,99,255,0.028)';
    ctx.lineWidth   = 1;
    const gs = 44;
    for (let x = 0; x < W; x += gs) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (let y = 0; y < H; y += gs) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }

    requestAnimationFrame(draw);
  }

  window.addEventListener('resize', resize);
  init(); draw();
})();
</script>

<!-- ── Nav Ripple ── -->
<script>
document.addEventListener('click', e => {
  const nav = e.target.closest('.nav-item');
  if (!nav) return;
  const rect = nav.getBoundingClientRect();
  const r = document.createElement('span');
  r.className = 'ripple';
  r.style.cssText = `left:${e.clientX-rect.left}px;top:${e.clientY-rect.top}px;width:60px;height:60px;margin:-30px`;
  nav.appendChild(r);
  setTimeout(() => r.remove(), 600);
});
</script>

<script src="js/app.js"></script>
<script src="js/dashboard.js"></script>
<script src="js/calendar.js"></script>
<script src="js/tasks.js"></script>
<script src="js/timer.js"></script>
<script src="js/mocks.js"></script>
<script src="js/rank.js"></script>
<script src="js/resources.js"></script>
<script src="js/settings.js"></script>

</html>
